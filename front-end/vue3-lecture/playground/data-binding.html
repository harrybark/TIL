<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- vue 관련 script -->
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <!-- vue router CDN-->
    <script src="https://unpkg.com/vue-router@3/dist/vue-router.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
     
    <div id="app">
        <p v-bind:id="uuid" v-bind:class="cName">{{ num }}</p>
        <p v-bind:class="cName">{{ doubleNum }}</p>

        <div v-if="loading">
            Loading...
        </div>
        <div v-else>
            test user has been logged in
        </div>

        <div v-show="loading">
            Loading...
        </div>
        <!-- TODO : 인풋 박스를 만들고 입력된 값을 p 태그에 출력 -->
        <input v-model="message">
        <p>
            {{ message }}
        </p>
    </div>

    <script>

        var vm = new Vue({
            el: '#app',
            data : {
                num : 10,
                uuid : 'abc1234',
                cName : 'text-blue',
                loading : true,
                message : ""
            },
            computed: {
                doubleNum : function() {
                    return (this.num * 2);
                }
            }
        })
    </script>
</body>
</html>
